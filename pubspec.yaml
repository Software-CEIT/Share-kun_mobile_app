name: share_kun
description: "Share Kun App"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.9.0
  retrofit: ^4.9.0
  json_annotation: ^4.9.0
  auto_route: ^10.1.2
  injectable: ^2.5.1
  flutter_bloc: ^9.1.1
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  intl: ^0.20.2
  get_it: ^8.2.0
  freezed_annotation: ^3.1.0
  cached_network_image: ^3.4.1
  easy_localization: ^3.0.7+1
  flutter_svg: ^2.2.0
  flutter_form_builder: ^10.2.0
  logger: ^2.6.0
  collection: ^1.19.1
  dartz: ^0.10.0
  path_provider: ^2.1.5
  flutter_gen: ^5.11.0
  bloc: ^9.0.0
  shared_preferences: ^2.5.3
  fluttertoast: ^9.0.0
  package_info_plus: ^8.3.1
  flutter_secure_storage: ^9.2.4
  loading_animation_widget: ^1.3.0
  form_builder_validators: ^11.2.0
  image_picker: ^1.1.2
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_messaging: ^16.1.1
  pin_code_fields: ^8.0.1
  sms_autofill: ^2.3.0
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.6.0
  retrofit_generator: ^10.0.1
  json_serializable: ^6.10.0
  injectable_generator: ^2.8.1
  freezed: ^3.2.0
  auto_route_generator: ^10.2.4
  flutter_gen_runner: ^5.11.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon/icon_app.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
    - assets/translations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_gen:
  output: lib/generated/
  integrations:
    image: true
    flutter_svg: true
